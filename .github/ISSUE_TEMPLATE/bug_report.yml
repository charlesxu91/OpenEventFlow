name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact steps to reproduce the problem.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: SDK, CLI, or commit version.
