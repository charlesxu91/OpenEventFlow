apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: openeventflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          env:
            - name: CLICKHOUSE_DB
              value: openeventflow
            - name: CLICKHOUSE_USER
              value: openeventflow
            - name: CLICKHOUSE_PASSWORD
              value: openeventflow
          ports:
            - containerPort: 8123
            - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: openeventflow
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
